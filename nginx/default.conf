# Replace planaltopizzasesorvetes.com with the production hostname.

# Connection upgrade map — nginx best practice for WebSockets. The
# Connection header is set to "upgrade" only when the client actually
# requested an upgrade; for normal HTTP requests it falls back to
# "close". Hardcoding `Connection: upgrade` on every request (the old
# config) breaks keep-alive on regular API calls and confuses some
# proxies upstream.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name planaltopizzasesorvetes.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name planaltopizzasesorvetes.com;

    # Docker's embedded DNS for service-name resolution. Pinning the
    # resolver + using a variable in every proxy_pass below defers DNS
    # lookup until the first request, which sidesteps the startup race
    # where nginx boots before the `backend` container is in the
    # network's name list and aborts with "host not found in upstream".
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend_upstream "backend:8000";

    ssl_certificate     /etc/letsencrypt/live/planaltopizzasesorvetes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planaltopizzasesorvetes.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 10m;

    # ─── WebSocket: admin live feed (orders + chat) ───────────────────
    # Long timeout so idle connections survive between messages; no
    # buffering so server-sent events reach the browser immediately.
    # The chat_message broadcast from _persist_message rides this same
    # endpoint — adding 30s read timeout here would silently kill the
    # connection between customer replies.
    location = /api/orders/live {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── WebSocket: customer-portal order tracking ────────────────────
    # Same long-lived-WS treatment for the customer track page socket.
    # Path is /api/customer/track/ws/{token} — the regex matches that
    # whole subtree.
    location ~ ^/api/customer/track/ws/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── Regular HTTP API ─────────────────────────────────────────────
    # Short read timeout (30s) so a stuck backend handler can't hold a
    # request open forever. WebSocket endpoints above match first and
    # are not affected.
    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Frontend (static build served by a small container or from ./dist)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
